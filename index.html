<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sori CCFolia Backup</title>
    
    <link rel="icon" type="image/png" href="fav.png">

    <style>
        /* 1. 전체 테마 배경 및 부드러운 스크롤 */
        body { 
            background-color: #0f111a; 
            color: #f1f1f4; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            margin: 0; 
            padding: 0;
            letter-spacing: -0.3px;
        }

        /* 2. 상단 글래스모피즘 헤더 & 툴바 */
        .toolbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 80px; 
            background: rgba(24, 28, 41, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 100; 
        }
        
        .toolbar h2 { 
            margin: 0; 
            font-size: 19px; 
            font-weight: 800;
            /* ✨ [색상 복구] 시원한 블루~아쿠아 그라데이션 */
            background: linear-gradient(135deg, #4dadff, #7df9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(77, 173, 255, 0.2);
            letter-spacing: 0.5px;
        }
        
        /* 3. 컨트롤러 섹션 배치 */
        .controls-group { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
        }
        
        .control-item { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .control-item strong { 
            color: #8f95b2; 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* 4. 파일 입력 & 셀렉트 박스 디자인 */
        select, input[type="file"] { 
            background: #1e2235; 
            color: #ffffff; 
            border: 1px solid #333955; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-size: 13px; 
            outline: none;
            transition: all 0.2s ease;
        }
        select:focus, input[type="file"]:hover {
            /* ✨ [색상 복구] 포커스 시 테두리 블루 */
            border-color: #4dadff;
            box-shadow: 0 0 8px rgba(77, 173, 255, 0.25);
        }
        select:disabled {
            background: #141622;
            color: #555a77;
            border-color: #222538;
            cursor: not-allowed;
        }
        
        /* 5. 우측 조작 액션 버튼 */
        .btn-group { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn { 
            border: none; 
            padding: 10px 18px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-download { 
            /* ✨ [색상 복구] 다운로드 버튼 블루 그라데이션 */
            background: linear-gradient(135deg, #4dadff, #2575fc); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(77, 173, 255, 0.3);
        }
        .btn-download:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 173, 255, 0.45);
        }
        
        .btn-copy { 
            background: #252940; 
            color: #e2e8f0; 
            border: 1px solid #3b4260; 
        }
        .btn-copy:hover:not(:disabled) { 
            background: #2e3454;
            color: #ffffff;
            border-color: #4dadff;
        }
        
        .btn:disabled {
            background: #1b1e2e !important;
            color: #4a4f6e !important;
            border: 1px solid #25283d !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed;
        }
        
        /* 6. 출력 대기실 및 전체 레이아웃 구역 */
        .preview-area { 
            margin-top: 120px; 
            padding: 20px 40px 60px 40px; 
        }
        
        /* 7. 대화 로그 컨테이너 스타일링 보호 */
        .log-container { 
            width: 100%; 
            max-width: 800px; 
            background-color: #151722; 
            border-radius: 12px; 
            padding: 30px !important; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            color: #e2e8f0; 
            margin: 0 auto; 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* 8. 미리보기 전용 말풍선 호버 래퍼 제어 */
        .chat-row { 
            display: flex; 
            align-items: flex-start; 
            position: relative; 
        } 
        
        .bubble-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 100%;
        }

        .avatar-box {
            width: 56px;
            height: 56px;
            margin-right: 16px;
            flex-shrink: 0;
            background-color: #0c0e17;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .text-wrap { display: flex; flex-direction: column; flex-grow: 1; padding-right: 80px; } 
        .char-name { font-weight: 600; font-size: 13.5px; margin-bottom: 6px; display: block; opacity: 0.9; }
        .bubbles-container { display: flex; flex-direction: column; gap: 6px; }
        
        p.message-bubble { 
            background-color: #1e2235; 
            border-radius: 0 10px 10px 10px; 
            padding: 10px 16px !important; 
            font-size: 14px; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            word-break: break-all; 
            color: #e2e8f0; 
            margin: 0; 
            width: fit-content; 
            max-width: 100%; 
            box-sizing: border-box; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* 주사위 전용 밝은 말풍선 */
        p.message-bubble.dice-bubble { 
            background: linear-gradient(135deg, #282d47, #22263d); 
            color: #7df9ff; 
            border: 1px solid rgba(125, 249, 255, 0.25); 
            box-shadow: 0 0 10px rgba(125, 249, 255, 0.05);
        }
        
        /* 나레이션 박스 */
        .narration-box { 
            background-color: #24293d; 
            border-radius: 8px; 
            padding: 12px 18px !important; 
            font-size: 14px; 
            line-height: 1.6; 
            white-space: pre-wrap; 
            word-break: break-all; 
            color: #ffffff; 
            text-align: center; 
            width: 100%; 
            box-sizing: border-box; 
            margin: 4px 0;
            /* ✨ [색상 복구] 나레이션 왼쪽 포인트 라인을 블루로 변경 */
            border-left: 3px solid #4dadff;
        }
        
        .tab-tag { 
            position: absolute; 
            top: 2px; 
            right: 2px; 
            display: inline-block; 
            padding: 3px 8px; 
            font-size: 10px; 
            font-weight: 600;
            border-radius: 4px; 
            background-color: #252940; 
            color: #8f95b2;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* 9. [실시간 수정/삭제 버튼 그룹] */
        .bubble-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.2s ease;
        }
        .bubble-wrapper:hover .bubble-actions {
            opacity: 1;
            transform: translateX(0);
        }

        .action-mini-btn {
            background: #1e2235;
            color: #8f95b2;
            border: 1px solid #333955;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-mini-btn:hover {
            color: #ffffff;
            background: #333955;
            /* ✨ [색상 복구] 미니 버튼 호버 테두리 블루 */
            border-color: #4dadff;
        }
        .action-mini-btn.delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Sori CCFolia Backup</h2>
        
        <div class="controls-group">
            <div class="control-item">
                <strong>1. 백업 파일 업로드</strong>
                <input type="file" id="html-file-picker" accept=".html,.txt">
            </div>
            
            <div class="control-item">
                <strong>2. 나레이션 캐릭터 지정</strong>
                <select id="narration-select" disabled>
                    <option value="">-- 파일 먼저 업로드 --</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-copy" id="copy-btn" disabled>📋 HTML 복사</button>
            <button class="btn btn-download" id="download-btn" disabled>💾 다운로드</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="output-wrapper"></div>
    </div>
