<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코코포리아 로그 정렬 뷰어</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .control-panel { max-width: 800px; margin: 0 auto 20px auto; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        textarea, input[type="text"] { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { background: #2196f3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1976d2; }
        #download-btn { background: #4caf50; }
        #download-btn:hover { background: #388e3c; }
        #copy-code-btn { background: #9c27b0; }
        #copy-code-btn:hover { background: #7b1fa2; }
        #status { font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>코코포리아 백업 로그 변환기</h2>
    <div id="status">ℹ️ 코코포리아에서 추출을 완료한 뒤, 아래 상자에 Ctrl+V를 해주세요.</div>
    
    <div class="input-group">
        <label>1. 확장 프로그램 데이터 붙여넣기 (Ctrl+V)</label>
        <textarea id="scraper-input" rows="3" placeholder="확장 프로그램 실행 후 복사된 텍스트를 여기에 붙여넣으세요..."></textarea>
    </div>

    <div class="input-group">
        <label>2. 코코포리아 백업 HTML 파일 선택</label>
        <input type="file" id="log-file" accept=".html">
    </div>

    <div class="input-group">
        <label>3. 나레이션 처리할 캐릭터 이름 (선택)</label>
        <input type="text" id="narration-name" placeholder="예: 시스템 또는 나레이터">
    </div>

    <div class="input-group" style="flex-direction: row; align-items: center; gap: 10px;">
        <input type="checkbox" id="include-chatter" checked>
        <label for="include-chatter">잡담 탭 내용 포함하기</label>
    </div>

    <div class="btn-container">
        <button id="preview-btn">정렬 및 미리보기 생성</button>
        <button id="download-btn">HTML 파일 다운로드</button>
        <button id="copy-code-btn">HTML 코드 클립보드 복사</button> </div>
</div>

<div id="preview-area" style="display:none; max-width:800px; margin: 0 auto;">
    <h3>미리보기 화면</h3>
    <div id="preview-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
