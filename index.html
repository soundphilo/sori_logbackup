<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코코포리아 로그 정렬 뷰어</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .control-box { max-width: 600px; margin: 20px auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #fff; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 15px 0; font-size: 14px; }
        .btn-ready { width: 100%; padding: 12px; background: #00bcd4; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-ready:hover { background: #0097a7; }
        
        #preview-area { max-width: 800px; margin: 30px auto; display: none; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-download { padding: 10px 20px; background: #4caf50; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-download:hover { background: #388e3c; }

        .log-container { width: 100%; background-color: #1e1e1e; border-radius: 8px; padding: 20px !important; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 12px; color: #e0e0e0; box-sizing: border-box;}
        .chat-row { display: flex; align-items: flex-start; position: relative; } 
        .avatar-box{width:64px;height:64px;margin-right:15px;flex-shrink:0;background-color:#1a1a1a;border-radius:8px;overflow:hidden}
        .avatar-box img{width:100%;height:100%;object-fit:contain}
        .text-wrap { display: flex; flex-direction: column; flex-grow: 1; padding-right: 60px; } 
        .char-name { font-weight: bold; font-size: 14px; margin-bottom: 6px; display: block; }
        .bubbles-container { display: flex; flex-direction: column; gap: 4px; }
        p.message-bubble { background-color: #141414; border-radius: 8px; padding: 8px 14px !important; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #dddddd; margin: 0; width: fit-content; max-width: 100%; box-sizing: border-box; }
        .narration-box { background-color: #2d2d2d; border-radius: 8px; padding: 10px 14px !important; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #ffffff; text-align: center; width: 100%; box-sizing: border-box; margin: 2px 0; }
        .tab-tag { position: absolute; top: 2px; right: 2px; display: inline-block; padding: 2px 6px; font-size: 10px; border-radius: 4px; background-color: #333; color: #aaa;}
    </style>
</head>
<body>

<div class="control-box">
    <h1>🎲 코코포리아 로그 정렬 뷰어</h1>
    <div id="status" style="margin-bottom: 15px; font-size: 14px; color: #00bcd4;">데이터 수신 대기 중...</div>
    
    <div class="input-group">
        <label for="log-file">코코포리아 백업 HTML 파일 업로드</label>
        <input type="file" id="log-file" accept=".html">
    </div>

    <div class="input-group">
        <label for="narration-name">나레이션(지문) 캐릭터 이름 (선택)</label>
        <input type="text" id="narration-name" placeholder="지문 닉네임 입력">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="include-chatter" checked>
        <label for="include-chatter">잡담 탭([other]) 내용도 포함하기</label>
    </div>

    <button id="preview-btn" class="btn-ready">정렬 및 미리보기 생성</button>
</div>

<div id="preview-area">
    <div class="preview-header">
        <h2>👀 정렬 미리보기</h2>
        <button id="download-btn" class="btn-download">정형 로그 HTML 다운로드</button>
    </div>
    <div id="preview-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
