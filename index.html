<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sori CCFolia Backup</title>
    <link rel="icon" type="image/png" href="fav.png">

    <style>
        /* 1. 전체 테마 배경 및 폰트 */
        body { 
            background-color: #0f111a; 
            color: #f1f1f4; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            margin: 0; 
            padding: 0;
            letter-spacing: -0.3px;
        }

        /* 2. 상단 고정 툴바 구역 */
        .toolbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 80px; 
            background: rgba(24, 28, 41, 0.9); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000; 
        }
        
        .toolbar h2 { 
            margin: 0; 
            font-size: 19px; 
            font-weight: 800;
            background: linear-gradient(135deg, #4dadff, #7df9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(77, 173, 255, 0.2);
            letter-spacing: 0.5px;
        }
        
        /* 3. 상단 설정 및 조작 버튼 */
        .controls-group { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
        }
        
        .control-item { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .control-item strong { 
            color: #8f95b2; 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        select, input[type="file"] { 
            background: #1e2235; 
            color: #ffffff; 
            border: 1px solid #333955; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-size: 13px; 
            outline: none;
            transition: all 0.2s ease;
        }
        select:focus, input[type="file"]:hover {
            border-color: #4dadff;
            box-shadow: 0 0 8px rgba(77, 173, 255, 0.25);
        }
        select:disabled {
            background: #141622;
            color: #555a77;
            border-color: #222538;
            cursor: not-allowed;
        }
        
        .btn-group { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn { 
            border: none; 
            padding: 10px 18px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.25s ease; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-download { 
            background: linear-gradient(135deg, #4dadff, #2575fc); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(77, 173, 255, 0.3);
        }
        .btn-download:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 173, 255, 0.45);
        }
        
        .btn-copy { 
            background: #252940; 
            color: #e2e8f0; 
            border: 1px solid #3b4260; 
        }
        .btn-copy:hover:not(:disabled) { 
            background: #2e3454;
            color: #ffffff;
            border-color: #4dadff;
        }
        
        .btn:disabled {
            background: #1b1e2e !important;
            color: #4a4f6e !important;
            border: 1px solid #25283d !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed;
        }
        
        /* 4. 출력 프리뷰 스튜디오 백그라운드 구역 */
        .preview-area { 
            margin-top: 110px; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        /* 🚀 핵심 스크립트 출력 데이터 보호 쉘 (데이터가 숨겨지지 않도록 전면 개방) */
        #output-wrapper {
            width: 100%;
            max-width: 850px;
            background-color: #151722;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-sizing: border-box;
        }

        /* 오리지널 백업 말풍선들과 충돌을 방지하기 위한 최소한의 간격 보정 */
        #output-wrapper > div {
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- 고정 메뉴바 상단 툴바 구역 -->
    <div class="toolbar">
        <h2>Sori CCFolia Backup</h2>
        
        <div class="controls-group">
            <div class="control-item">
                <strong>1. 백업 파일 업로드</strong>
                <input type="file" id="html-file-picker" accept=".html,.txt">
            </div>
            
            <div class="control-item">
                <strong>2. 나레이션 캐릭터 지정</strong>
                <select id="narration-select" disabled>
                    <option value="">-- 파일 먼저 업로드 --</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-copy" id="copy-btn" disabled>📋 HTML 복사</button>
            <button class="btn btn-download" id="download-btn" disabled>💾 다운로드</button>
        </div>
    </div>

    <!-- 변환 출력 프리뷰 컨테이너 구역 -->
    <div class="preview-area">
        <div id="output-wrapper"></div>
    </div>

    <!-- 백엔드 로직 스크립트 연결 -->
    <script src="script.js"></script>
</body>
</html>
