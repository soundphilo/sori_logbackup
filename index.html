<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sori CCFolia Backup</title>
    <link rel="icon" type="image/png" href="fav.png">

    <style>
        /* ==========================================
           [1] 작업실 웹사이트 전용 다크 스튜디오 테마
        ========================================== */
        body { 
            background-color: #0f111a; 
            color: #f1f1f4; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            margin: 0; 
            padding: 0;
            letter-spacing: -0.3px;
        }

        /* 상단 고정 툴바 구역 */
        .toolbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 80px; 
            background: rgba(24, 28, 41, 0.9); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000; 
        }
        
        .toolbar h2 { 
            margin: 0; 
            font-size: 19px; 
            font-weight: 800;
            background: linear-gradient(135deg, #4dadff, #7df9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(77, 173, 255, 0.2);
            letter-spacing: 0.5px;
        }
        
        /* 컨트롤러 배치 그룹 */
        .controls-group { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
        }
        
        .control-item { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .control-item strong { 
            color: #8f95b2; 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        select, input[type="file"] { 
            background: #1e2235; 
            color: #ffffff; 
            border: 1px solid #333955; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-size: 13px; 
            outline: none;
            transition: all 0.2s ease;
        }
        select:focus, input[type="file"]:hover {
            border-color: #4dadff;
            box-shadow: 0 0 8px rgba(77, 173, 255, 0.25);
        }
        select:disabled {
            background: #141622;
            color: #555a77;
            border-color: #222538;
            cursor: not-allowed;
        }
        
        .btn-group { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn { 
            border: none; 
            padding: 10px 18px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.25s ease; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-download { 
            background: linear-gradient(135deg, #4dadff, #2575fc); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(77, 173, 255, 0.3);
        }
        .btn-download:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 173, 255, 0.45);
        }
        
        .btn-copy { 
            background: #252940; 
            color: #e2e8f0; 
            border: 1px solid #3b4260; 
        }
        .btn-copy:hover:not(:disabled) { 
            background: #2e3454;
            color: #ffffff;
            border-color: #4dadff;
        }
        
        .btn:disabled {
            background: #1b1e2e;
            color: #4a4f6e;
            border: 1px solid #25283d;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }
        
        /* 작업 영역 전체 배치 레이아웃 */
        .preview-area { 
            margin-top: 100px; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        #output-wrapper {
            width: 100%;
            max-width: 850px;
            box-sizing: border-box;
        }

        /* 대기 중/안내용 문구 h3용 스타일 */
        #output-wrapper h3 {
            font-size: 14px;
            font-weight: 500;
            background-color: #151722;
            padding: 40px 20px;
            border-radius: 12px;
            border: 1px dashed rgba(77, 173, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* 실시간 수정/삭제 버튼 조작을 위한 절대 좌표 처리 */
        .bubble-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .bubble-actions { 
            display: flex; 
            gap: 6px; 
            opacity: 0; 
            transition: all 0.2s ease;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }
        
        .bubble-wrapper:hover .bubble-actions { 
            opacity: 1; 
        }
        
        .action-mini-btn { 
            background: #252940; 
            color: #8f95b2; 
            border: 1px solid #3b4260; 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-size: 11px; 
            cursor: pointer; 
        }
        .action-mini-btn:hover { 
            color: #ffffff; 
            border-color: #4dadff; 
        }
        .action-mini-btn.delete-btn:hover { 
            background: rgba(239, 68, 68, 0.2); 
            border-color: #ef4444; 
            color: #fca5a5; 
        }


        /* ==========================================
           [2] 순정 로그 스킨 백업 스타일
           (다운로드 결과물 디자인 원본 유지 - 과도한 !important 정리)
        ========================================== */
        .log-container { 
            width: 100%; 
            max-width: 800px; 
            background-color: #1e1e1e; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            color: #e0e0e0; 
            font-family: sans-serif; 
            margin: 20px auto; 
            box-sizing: border-box;
        }
        .chat-row { display: flex; align-items: flex-start; position: relative; margin: 0; padding: 0; } 
        .avatar-box { width: 64px; height: 64px; margin-right: 15px; flex-shrink: 0; background-color: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: contain; margin: 0; padding: 0; }
        .text-wrap { display: flex; flex-grow: 1; padding-right: 120px; } 
        .char-name { font-weight: bold; font-size: 14px; margin-bottom: 6px; display: block; }
        .bubbles-container { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        
        /* 자바스크립트가 인라인 스타일로 오버라이딩하는 속성을 방해하지 않기 위해 최소화 */
        p.message-bubble { background-color: #141414; border-radius: 8px; padding: 8px 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #dddddd; margin: 0; width: fit-content; max-width: 100%; box-sizing: border-box; }
        p.message-bubble.dice-bubble { background-color: #2a2a2a; color: #ffffff; border: 1px solid #444; }
        .narration-box { background-color: #2d2d2d; border-radius: 8px; padding: 10px 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #ffffff; text-align: center; width: 100%; box-sizing: border-box; margin: 2px 0; }
        .tab-tag { position: absolute; top: 2px; right: 2px; display: inline-block; padding: 2px 6px; font-size: 10px; border-radius: 4px; background-color: #333; color: #aaa; }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Sori CCFolia Backup</h2>
        <div class="controls-group">
            <div class="control-item">
                <strong>1. 백업 파일 업로드</strong>
                <input type="file" id="html-file-picker" accept=".html,.txt">
            </div>
            <div class="control-item">
                <strong>2. 나레이션 캐릭터 지정</strong>
                <select id="narration-select" disabled>
                    <option value="">-- 파일 먼저 업로드 --</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-copy" id="copy-btn" disabled>📋 HTML 복사</button>
            <button class="btn btn-download" id="download-btn" disabled>💾 다운로드</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="output-wrapper"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
