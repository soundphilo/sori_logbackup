<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sori CCFolia Backup</title>
    
    <link rel="icon" type="image/png" href="fav.png">

    <style>
        /* 1. 전체 기본 테마 스타일 */
        body { 
            background-color: #0f111a; 
            color: #f1f1f4; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            margin: 0; 
            padding: 0;
            letter-spacing: -0.3px;
        }

        /* 2. 상단 고정 툴바 구역 */
        .toolbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 80px; 
            background: rgba(24, 28, 41, 0.9); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000; 
        }
        
        .toolbar h2 { 
            margin: 0; 
            font-size: 19px; 
            font-weight: 800;
            background: linear-gradient(135deg, #4dadff, #7df9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(77, 173, 255, 0.2);
            letter-spacing: 0.5px;
        }
        
        /* 3. 컨트롤러 배치 그룹 */
        .controls-group { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
        }
        
        .control-item { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .control-item strong { 
            color: #8f95b2; 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        select, input[type="file"] { 
            background: #1e2235; 
            color: #ffffff; 
            border: 1px solid #333955; 
            padding: 8px 14px; 
            border-radius: 6px; 
            font-size: 13px; 
            outline: none;
            transition: all 0.2s ease;
        }
        select:focus, input[type="file"]:hover {
            border-color: #4dadff;
            box-shadow: 0 0 8px rgba(77, 173, 255, 0.25);
        }
        select:disabled {
            background: #141622;
            color: #555a77;
            border-color: #222538;
            cursor: not-allowed;
        }
        
        .btn-group { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn { 
            border: none; 
            padding: 10px 18px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.25s ease; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-download { 
            background: linear-gradient(135deg, #4dadff, #2575fc); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(77, 173, 255, 0.3);
        }
        .btn-download:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(77, 173, 255, 0.45);
        }
        
        .btn-copy { 
            background: #252940; 
            color: #e2e8f0; 
            border: 1px solid #3b4260; 
        }
        .btn-copy:hover:not(:disabled) { 
            background: #2e3454;
            color: #ffffff;
            border-color: #4dadff;
        }
        
        .btn:disabled {
            background: #1b1e2e !important;
            color: #4a4f6e !important;
            border: 1px solid #25283d !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: not-allowed;
        }
        
        /* 4. 변환 출력 프리뷰 바깥 레이아웃 구역 */
        .preview-area { 
            margin-top: 100px; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        /* ⚠️ [구조 변경 핵심] 자바스크립트가 innerHTML로 내용을 밀어 넣는 타겟 태그 */
        #output-wrapper {
            width: 100%;
            max-width: 850px;
            box-sizing: border-box;
        }

        /* 🚀 스크립트가 집어넣은 수집 완료 안내문(h3) 전용 테마 스타일 지정 */
        #output-wrapper h3 {
            font-size: 15px;
            font-weight: 500;
            background-color: #151722;
            padding: 40px 20px !important;
            border-radius: 12px;
            border: 1px dashed rgba(77, 173, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* 🚀 스크립트가 가공해 낸 실제 대화방 본체 박스 테마 스타일 지정 */
        #output-wrapper .log-container {
            background-color: #151722 !important;
            border-radius: 12px !important;
            padding: 30px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        /* 미니 액션 툴바 위치 보정 */
        .bubble-actions { display: flex; gap: 6px; opacity: 0; transform: translateX(-5px); transition: all 0.2s ease; }
        .bubble-wrapper:hover .bubble-actions { opacity: 1; transform: translateX(0); }
        .action-mini-btn { background: #1e2235; color: #8f95b2; border: 1px solid #333955; padding: 4px 8px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .action-mini-btn:hover { color: #ffffff; border-color: #4dadff; }
        .action-mini-btn.delete-btn:hover { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #fca5a5; }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Sori CCFolia Backup</h2>
        
        <div class="controls-group">
            <div class="control-item">
                <strong>1. 백업 파일 업로드</strong>
                <input type="file" id="html-file-picker" accept=".html,.txt">
            </div>
            
            <div class="control-item">
                <strong>2. 나레이션 캐릭터 지정</strong>
                <select id="narration-select" disabled>
                    <option value="">-- 파일 먼저 업로드 --</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-copy" id="copy-btn" disabled>📋 HTML 복사</button>
            <button class="btn btn-download" id="download-btn" disabled>💾 다운로드</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="output-wrapper"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
